services:
  - type: web
    name: 1cbas-backend
    env: node
    plan: free
    rootDir: .
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/products
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DB_PATH
        value: /opt/render/project/data/1cremix.db
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/data
      sizeGB: 1
